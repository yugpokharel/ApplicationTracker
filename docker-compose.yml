services:
  postgres:
    image: postgres:16-alpine
    container_name: application_tracker_db
    environment:
      POSTGRES_USER: tracker_user
      POSTGRES_PASSWORD: tracker_password
      POSTGRES_DB: application_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker_user -d application_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
